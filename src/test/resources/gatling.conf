# Gatling Configuration

gatling {
  data {
    # Data directory for simulation files
    directory = "src/test/resources"
  }
  
  simulation {
    # Default simulation class
    class = "com.example.instagram2.performance.SimplePostSimulation"
  }
  
  http {
    # HTTP configuration
    baseUrls = ["http://localhost:8080"]
    userAgent = "Gatling-Performance-Test"
    acceptHeader = "application/json"
    contentTypeHeader = "application/json"
  }
  
  charting {
    # Charting configuration
    noReports = false
    maxPlotsPerSeries = 1000
    useGroupDurationMetric = true
  }
  
  engine {
    # Simulation engine configuration
    maxDuration = 10 minutes
    minDuration = 30 seconds
  }
}
